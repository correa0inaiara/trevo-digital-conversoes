<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevo Digital Conversões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: sans-serif; }
        .trevo-gradient {
            background: linear-gradient(135deg, #4ade80 0%, #166534 100%);
        }
        .bg-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-pattern flex flex-col min-h-screen items-center justify-center p-4">

    <main class="max-w-md w-full text-center space-y-8 bg-black/40 p-8 rounded-3xl border border-white/10 backdrop-blur-md shadow-2xl">
        
        <div class="flex justify-center">
            <div class="w-40 h-40 rounded-full overflow-hidden border-2 border-green-500/50 shadow-lg shadow-green-500/20">
                <img src="Logo Redes Sociais Trevo Digital Conversões.png" alt="Trevo Digital Conversões" class="w-full h-full object-cover">
            </div>
        </div>

        <header class="space-y-2">
            <h1 class="text-2xl font-bold tracking-tight text-white uppercase">
                Trevo Digital <span class="text-green-500">Conversões</span>
            </h1>
            <div class="h-1 w-12 bg-green-500 mx-auto rounded-full"></div>
            <p class="text-gray-400 text-sm mt-4">Conectando tecnologia e vendas para gerar resultados reais.</p>
        </header>

        <div class="flex flex-col gap-4">
            <a href="URL_DO_SEU_PRODUTO_1" class="trevo-gradient hover:scale-105 transition-transform text-white font-bold py-4 rounded-xl shadow-lg shadow-green-900/20">
                Acessar Oferta Exclusiva
            </a>
            
            <a href="URL_DO_SEU_PRODUTO_2" class="bg-transparent border border-green-500 hover:bg-green-500/10 text-green-500 font-semibold py-3 rounded-xl transition-all">
                Ver Outros Produtos
            </a>
        </div>

        <footer class="pt-8 text-[11px] text-gray-500 font-medium tracking-wider leading-relaxed">
            Naiara Correa • Carazinho/RS • Onde o tráfego faz a curva para o sucesso.
        </footer>
    </main>

</body>
</html>
